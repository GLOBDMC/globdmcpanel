<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobDMC — Operations Control Center</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:      #0b0f1e;
            --navy-mid:  #111827;
            --navy-card: rgba(15, 20, 40, 0.72);
            --blue:      #1d4ed8;
            --blue-glow: rgba(59, 130, 246, 0.18);
            --cyan:      #67e8f9;
            --cyan-dim:  rgba(103, 232, 249, 0.55);
            --white:     #f8fafc;
            --muted:     rgba(148, 163, 184, 0.7);
            --border:    rgba(99, 130, 200, 0.18);
            --input-bg:  rgba(15, 23, 42, 0.6);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--navy);
            color: var(--white);
            overflow-x: hidden;
        }

        /* ── BACKGROUND ── */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(29, 78, 216, 0.22) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%,  rgba(103, 232, 249, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 10% 80%,  rgba(99, 102, 241, 0.07) 0%, transparent 50%),
                linear-gradient(160deg, #0b0f1e 0%, #0d1424 50%, #080c18 100%);
        }

        /* Subtle grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(99,130,200,0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,130,200,0.045) 1px, transparent 1px);
            background-size: 52px 52px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        /* Ambient glow orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }
        .glow-orb-1 {
            width: 600px; height: 600px;
            top: -200px; left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(29,78,216,0.14) 0%, transparent 70%);
            animation: glow-pulse 8s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 400px; height: 400px;
            bottom: -100px; right: -80px;
            background: radial-gradient(circle, rgba(103,232,249,0.07) 0%, transparent 70%);
            animation: glow-pulse 11s ease-in-out infinite reverse;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.7; }
            50%       { opacity: 1.0; }
        }

        /* Star canvas */
        #stars-canvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Scan line — very subtle */
        .scan-line {
            position: fixed;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(103,232,249,0.12), transparent);
            z-index: 3;
            animation: scan 12s linear infinite;
        }
        @keyframes scan {
            0%   { top: -2px; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 100vh; opacity: 0; }
        }

        /* ── LAYOUT ── */
        .page {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ── HEADER BRANDING ── */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .logo-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .logo-glow-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 40%, rgba(103,232,249,0.4) 50%, transparent 60%);
            animation: ring-spin 6s linear infinite;
        }

        @keyframes ring-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .logo-img {
            position: relative;
            width: 52px; height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid rgba(103,232,249,0.25);
            box-shadow: 0 0 24px rgba(59,130,246,0.3), 0 0 8px rgba(103,232,249,0.2);
            z-index: 1;
        }

        .brand-text .brand-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--white);
            line-height: 1.1;
        }
        .brand-text .brand-name span {
            color: var(--cyan);
        }
        .brand-text .brand-tagline {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── GLASS CARD ── */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--navy-card);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 36px 28px;
            box-shadow:
                0 32px 64px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.03) inset,
                0 1px 0 rgba(255,255,255,0.07) inset;
        }

        /* Top accent line */
        .card::before {
            content: '';
            display: block;
            height: 1px;
            margin: -36px -36px 32px;
            background: linear-gradient(90deg, transparent, rgba(103,232,249,0.35), transparent);
            border-radius: 20px 20px 0 0;
        }

        /* ── CARD HEADER ── */
        .card-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.01em;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
            line-height: 1.55;
        }

        /* ── FEATURE ROW ── */
        .features {
            display: flex;
            gap: 6px;
            margin-top: 18px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .feature-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(99,130,200,0.18);
            border-radius: 999px;
            font-size: 10.5px;
            color: rgba(148,163,184,0.85);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .feature-pill svg {
            width: 11px; height: 11px;
            stroke: var(--cyan-dim);
            flex-shrink: 0;
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 24px;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(148,163,184,0.6);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--input-bg);
            border: 1px solid rgba(99,130,200,0.2);
            border-radius: 10px;
            font-size: 14px;
            color: var(--white);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        .form-input::placeholder { color: rgba(148,163,184,0.3); }

        .form-input:focus {
            border-color: rgba(103,232,249,0.4);
            background: rgba(15,23,42,0.8);
            box-shadow: 0 0 0 3px rgba(103,232,249,0.07), 0 0 12px rgba(59,130,246,0.1);
        }

        /* ── ERROR ── */
        .error-box {
            padding: 10px 14px;
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.25);
            border-radius: 10px;
            font-size: 12.5px;
            color: #fca5a5;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error-box svg { width: 14px; height: 14px; stroke: #fca5a5; flex-shrink: 0; }

        /* ── BUTTON ── */
        .btn-login {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #1e40af 100%);
            border: 1px solid rgba(99,130,246,0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(29,78,216,0.3), 0 1px 0 rgba(255,255,255,0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(29,78,216,0.45), 0 1px 0 rgba(255,255,255,0.12) inset;
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login svg { width: 15px; height: 15px; stroke: rgba(255,255,255,0.8); }

        /* ── FOOTER ── */
        .card-footer {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: #34d399;
            border-radius: 50%;
            box-shadow: 0 0 6px #34d399;
            display: inline-block;
            animation: blink 2.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.3; }
        }

        .footer-text {
            font-size: 10.5px;
            color: rgba(100,116,139,0.6);
            letter-spacing: 0.06em;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: rgba(52,211,153,0.7);
            letter-spacing: 0.06em;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .card { padding: 28px 22px 22px; border-radius: 16px; }
            .card::before { margin: -28px -22px 26px; }
            .brand-header { margin-bottom: 22px; }
            .features { gap: 5px; }
            .feature-pill { font-size: 10px; padding: 3px 8px; }
            .brand-text .brand-name { font-size: 19px; }
        }

        @media (max-width: 360px) {
            .features { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="bg-scene"></div>
    <div class="bg-grid"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <canvas id="stars-canvas"></canvas>
    <div class="scan-line"></div>

    <div class="page">

        <!-- Brand header -->
        <div class="brand-header">
            <div class="logo-wrap">
                <div class="logo-glow-ring"></div>
                <img src="/static/logo.jpg" alt="GlobDMC" class="logo-img"/>
            </div>
            <div class="brand-text">
                <div class="brand-name">GLOB<span>DMC</span></div>
                <div class="brand-tagline">Tour &amp; Cruise Management</div>
            </div>
        </div>

        <!-- Glass card -->
        <div class="card">

            <div class="card-title">Operations Control Center</div>
            <div class="card-subtitle">AI-supported cruise operations and market intelligence platform</div>

            <!-- Feature pills -->
            <div class="features">
                <div class="feature-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    AI-Supported Analytics
                </div>
                <div class="feature-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    Real-Time Monitoring
                </div>
                <div class="feature-pill">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 0 1 0 9Z"/>
                    </svg>
                    Cloud Synchronization
                </div>
            </div>

            <div class="divider"></div>

            {% if hata %}
            <div class="error-box">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                {{ hata }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input name="kullanici_adi" type="text" class="form-input" placeholder="Enter your username" required autofocus autocomplete="username"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input name="sifre" type="password" class="form-input" placeholder="••••••••" required autocomplete="current-password"/>
                </div>

                <button type="submit" class="btn-login">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Sign In to Dashboard
                </button>
            </form>

            <div class="card-footer">
                <span class="footer-text">© 2025 GlobDMC · v2.0</span>
                <span class="system-status">
                    <span class="status-dot"></span>
                    All Systems Operational
                </span>
            </div>

        </div>

    </div>

    <script>
        // Minimal star field
        (function() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let stars = [];

            function resize() {
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function initStars(n) {
                stars = [];
                for (let i = 0; i < n; i++) {
                    stars.push({
                        x:     Math.random() * canvas.width,
                        y:     Math.random() * canvas.height,
                        r:     Math.random() * 0.9 + 0.2,
                        alpha: Math.random() * 0.5 + 0.1,
                        speed: Math.random() * 0.004 + 0.001,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            function draw(t) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 1000 + s.phase));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 220, 255, ${a})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }

            resize();
            initStars(120);
            window.addEventListener('resize', () => { resize(); initStars(120); });
            requestAnimationFrame(draw);
        })();
    </script>

</body>
</html>

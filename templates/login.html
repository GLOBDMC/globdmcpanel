<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GlobDMC — Giriş</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'glob-dark': '#252D45', 'glob-darker': '#1A2138' } } }
        }
    </script>
</head>
<body class="bg-glob-darker min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="flex justify-center mb-8">
            <img src="/static/logo.jpg" alt="GlobDMC" class="h-14 rounded-lg shadow-lg"/>
        </div>
        <div class="bg-white rounded-xl shadow-xl p-8">
            <h1 class="text-xl font-bold text-glob-dark mb-1">Operasyon Paneli</h1>
            <p class="text-sm text-gray-400 mb-6">Devam etmek için giriş yapın</p>

            {% if hata %}
            <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-2.5 rounded-lg mb-4">
                {{ hata }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Kullanıcı Adı</label>
                    <input name="kullanici_adi" type="text" required autofocus
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-glob-dark"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Şifre</label>
                    <input name="sifre" type="password" required
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-glob-dark"/>
                </div>
                <button type="submit"
                    class="w-full bg-glob-dark hover:bg-glob-darker text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2">
                    Giriş Yap
                </button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobDMC — Giriş</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:     #0b0f1e;
            --navy-mid: #111827;
            --glob-dark:#252D45;
            --border:   rgba(99, 130, 200, 0.18);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--navy);
            overflow-x: hidden;
        }

        /* ── BACKGROUND ── */
        .bg-scene {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(29,78,216,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%,  rgba(103,232,249,0.06) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 10% 80%,  rgba(99,102,241,0.07) 0%, transparent 50%),
                linear-gradient(160deg, #0b0f1e 0%, #0d1424 50%, #080c18 100%);
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 1;
            background-image:
                linear-gradient(rgba(99,130,200,0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,130,200,0.045) 1px, transparent 1px);
            background-size: 52px 52px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        .glow-orb {
            position: fixed; border-radius: 50%;
            filter: blur(80px); pointer-events: none; z-index: 1;
        }
        .glow-orb-1 {
            width: 600px; height: 600px;
            top: -200px; left: 50%; transform: translateX(-50%);
            background: radial-gradient(circle, rgba(29,78,216,0.14) 0%, transparent 70%);
            animation: glow-pulse 8s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 400px; height: 400px;
            bottom: -100px; right: -80px;
            background: radial-gradient(circle, rgba(103,232,249,0.07) 0%, transparent 70%);
            animation: glow-pulse 11s ease-in-out infinite reverse;
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.7; }
            50%       { opacity: 1.0; }
        }

        #stars-canvas {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
        }

        .scan-line {
            position: fixed; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(103,232,249,0.12), transparent);
            z-index: 3;
            animation: scan 12s linear infinite;
        }
        @keyframes scan {
            0%   { top: -2px; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 100vh; opacity: 0; }
        }

        /* ── PAGE ── */
        .page {
            position: relative; z-index: 10;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px 16px;
        }

        /* ── LOGO (eski sade) ── */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }

        .logo-wrap {
            margin-bottom: 28px;
            display: flex; justify-content: center;
        }
        .logo-wrap img {
            height: 56px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
        }

        /* ── CARD (eski beyaz) ── */
        .card {
            width: 100%; max-width: 360px;
            background: #ffffff;
            border-radius: 14px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
        }

        .card-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--glob-dark);
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 24px;
        }

        /* ── ERROR ── */
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 11.5px;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 5px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            color: #111827;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            -webkit-appearance: none;
            background: #fff;
        }
        .form-input:focus {
            border-color: var(--glob-dark);
            box-shadow: 0 0 0 3px rgba(37,45,69,0.1);
        }

        /* ── BUTTON ── */
        .btn-login {
            width: 100%;
            margin-top: 8px;
            padding: 11px;
            background: var(--glob-dark);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-login:hover { background: var(--navy-mid); }

        @media (max-width: 400px) {
            .card { padding: 24px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-scene"></div>
    <div class="bg-grid"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <canvas id="stars-canvas"></canvas>
    <div class="scan-line"></div>

    <div class="page">

        <div class="logo-wrap">
            <img src="/static/logo.jpg" alt="GlobDMC"/>
        </div>

        <div class="card">
            <div class="card-title">Akıllı Operasyon Merkezi</div>
            <div class="card-subtitle">Devam etmek için giriş yapın</div>

            {% if hata %}
            <div class="error-box">{{ hata }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="form-label">Kullanıcı Adı</label>
                    <input name="kullanici_adi" type="text" class="form-input"
                           required autofocus autocomplete="username"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Şifre</label>
                    <input name="sifre" type="password" class="form-input"
                           required autocomplete="current-password"/>
                </div>
                <button type="submit" class="btn-login">Giriş Yap</button>
            </form>
        </div>

    </div>

    <script>
        (function () {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let stars = [];

            function resize() {
                canvas.width  = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function init() {
                stars = [];
                for (let i = 0; i < 120; i++) {
                    stars.push({
                        x:     Math.random() * canvas.width,
                        y:     Math.random() * canvas.height,
                        r:     Math.random() * 0.9 + 0.2,
                        alpha: Math.random() * 0.5 + 0.1,
                        speed: Math.random() * 0.004 + 0.001,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            function draw(t) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(function(s) {
                    var a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 1000 + s.phase));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(200,220,255,' + a + ')';
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }

            resize();
            init();
            window.addEventListener('resize', function() { resize(); init(); });
            requestAnimationFrame(draw);
        })();
    </script>

</body>
</html>

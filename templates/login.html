<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GlobDMC — Giriş</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'glob-dark': '#252D45', 'glob-darker': '#1A2138' } } }
        }
    </script>
    <style>
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(28px) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(28px) rotate(-360deg); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        @keyframes drift {
            0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity: 0; }
        }
        .star { animation: twinkle var(--dur, 2s) ease-in-out infinite; animation-delay: var(--del, 0s); }
        .float-logo { animation: float 4s ease-in-out infinite; }
        .orbit-dot { animation: orbit 3s linear infinite; animation-delay: var(--del, 0s); }
        .particle { animation: drift var(--dur, 8s) linear infinite; animation-delay: var(--del, 0s); }
    </style>
</head>
<body class="bg-glob-darker min-h-screen flex items-center justify-center overflow-hidden relative">

    <!-- Yıldız arka planı -->
    <div class="absolute inset-0 pointer-events-none select-none">
        <!-- Sabit yıldızlar -->
        <span class="star absolute text-white text-xs" style="top:8%;left:12%;--dur:2.1s;--del:0s">✦</span>
        <span class="star absolute text-white text-xs" style="top:15%;left:78%;--dur:3.2s;--del:0.5s">★</span>
        <span class="star absolute text-white text-xs" style="top:22%;left:45%;--dur:1.8s;--del:1.1s">·</span>
        <span class="star absolute text-white" style="top:5%;left:55%;--dur:2.5s;--del:0.3s;font-size:6px">✦</span>
        <span class="star absolute text-white" style="top:35%;left:90%;--dur:3s;--del:0.8s;font-size:5px">★</span>
        <span class="star absolute text-white" style="top:50%;left:6%;--dur:2.3s;--del:1.4s;font-size:7px">✦</span>
        <span class="star absolute text-white" style="top:65%;left:82%;--dur:1.9s;--del:0.2s;font-size:5px">·</span>
        <span class="star absolute text-white" style="top:75%;left:30%;--dur:2.7s;--del:0.9s;font-size:6px">★</span>
        <span class="star absolute text-white" style="top:82%;left:65%;--dur:2.2s;--del:1.6s;font-size:8px">✦</span>
        <span class="star absolute text-white" style="top:90%;left:18%;--dur:3.1s;--del:0.4s;font-size:5px">★</span>
        <span class="star absolute text-white" style="top:42%;left:60%;--dur:2s;--del:1.2s;font-size:5px">·</span>
        <span class="star absolute text-white" style="top:28%;left:25%;--dur:2.8s;--del:0.7s;font-size:6px">✦</span>
        <span class="star absolute text-blue-300" style="top:18%;left:88%;--dur:2.4s;--del:1.8s;font-size:5px">★</span>
        <span class="star absolute text-blue-200" style="top:58%;left:48%;--dur:3.3s;--del:0.6s;font-size:4px">✦</span>
        <span class="star absolute text-indigo-300" style="top:70%;left:72%;--dur:1.7s;--del:1s;font-size:7px">★</span>

        <!-- Uzay ikonları köşelerde -->
        <div class="absolute top-6 left-6 text-blue-400 opacity-20 text-5xl">🛸</div>
        <div class="absolute bottom-8 right-8 text-indigo-400 opacity-15 text-6xl">🌌</div>
        <div class="absolute top-1/3 right-6 text-blue-300 opacity-15 text-4xl">🪐</div>
        <div class="absolute bottom-1/4 left-8 text-indigo-300 opacity-15 text-4xl">🚀</div>

        <!-- Yapay zeka / veri sembolleri -->
        <div class="absolute top-12 right-1/4 text-blue-400 opacity-10 text-3xl font-mono select-none">01</div>
        <div class="absolute bottom-16 left-1/4 text-indigo-400 opacity-10 text-2xl font-mono select-none">AI</div>
        <div class="absolute top-1/2 left-1/5 text-blue-300 opacity-10 text-xl font-mono select-none">∞</div>
        <div class="absolute top-1/4 right-12 text-purple-300 opacity-10 text-2xl font-mono select-none">⚡</div>
    </div>

    <!-- Login Kutusu -->
    <div class="w-full max-w-sm relative z-10">

        <!-- Logo + orbit animasyonu -->
        <div class="flex justify-center mb-8">
            <div class="relative float-logo">
                <!-- Pulse ring -->
                <div class="absolute inset-0 rounded-full border border-blue-400 opacity-30" style="animation: pulse-ring 2s ease-out infinite;"></div>
                <div class="absolute inset-0 rounded-full border border-blue-400 opacity-20" style="animation: pulse-ring 2s ease-out infinite; animation-delay: 0.6s;"></div>
                <img src="/static/logo.jpg" alt="GlobDMC" class="h-16 rounded-full shadow-2xl relative z-10 ring-2 ring-blue-400 ring-opacity-40"/>
                <!-- Orbit nokta -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="orbit-dot w-2 h-2 bg-blue-400 rounded-full opacity-70" style="--del:0s"></div>
                </div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="orbit-dot w-1.5 h-1.5 bg-indigo-300 rounded-full opacity-50" style="--del:-1.5s"></div>
                </div>
            </div>
        </div>

        <!-- Kart -->
        <div class="bg-white bg-opacity-95 rounded-2xl shadow-2xl p-8 backdrop-blur-sm border border-white border-opacity-20">

            <div class="flex items-center gap-2 mb-1">
                <h1 class="text-xl font-bold text-glob-dark">Operasyon Paneli</h1>
                <span class="text-lg">🛰️</span>
            </div>
            <p class="text-xs text-gray-400 mb-1">Devam etmek için giriş yapın</p>
            <div class="flex items-center gap-3 mb-6">
                <span class="text-xs text-blue-400 font-medium flex items-center gap-1">
                    <span>🤖</span> AI destekli
                </span>
                <span class="text-gray-200">|</span>
                <span class="text-xs text-indigo-400 font-medium flex items-center gap-1">
                    <span>⚡</span> Gerçek zamanlı
                </span>
                <span class="text-gray-200">|</span>
                <span class="text-xs text-purple-400 font-medium flex items-center gap-1">
                    <span>🌐</span> Bulut
                </span>
            </div>

            {% if hata %}
            <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-2.5 rounded-lg mb-4">
                {{ hata }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Kullanıcı Adı</label>
                    <input name="kullanici_adi" type="text" required autofocus
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-glob-dark"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Şifre</label>
                    <input name="sifre" type="password" required
                        class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-glob-dark"/>
                </div>
                <button type="submit"
                    class="w-full bg-glob-dark hover:bg-glob-darker text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2 flex items-center justify-center gap-2">
                    <span>Giriş Yap</span>
                    <span>🚀</span>
                </button>
            </form>

            <p class="text-center text-xs text-gray-300 mt-5">GlobDMC · Tour Management System</p>
        </div>
    </div>

</body>
</html>
